name: publish-apt-repo

# Build every package from the submodules under packages/, run reprepro, and
# deploy the signed apt repo to GitHub Pages.
#
# Trigger model: this runs on push to this repo. Bumping a submodule pointer
# (the only way a package update reaches here) is a commit + push, which kicks
# the build -- so the package repos themselves do NOT need to dispatch anything.

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# only run one at a time
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      # Token for cloning the (private) submodule repos during checkout. The
      # org-owned app must be installed on every submodule repo; with no
      # `repositories:` the token covers all repos the app is installed on, so
      # new packages need no workflow change here.
      - name: Mint app token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: nextthingco

      - uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ steps.app-token.outputs.token }}

      # arm/v7 emulation so the shared userspace image can build natively.
      - uses: docker/setup-qemu-action@v3

      # Per-package .deb cache, keyed inside dcache/ by each submodule's HEAD sha
      # (build.sh handles the per-package logic). Evolving-cache pattern: a unique
      # key each run so the post-step always saves the updated dcache, with a
      # prefix restore-key to seed from the most recent prior run. Result: only
      # packages whose submodule pointer moved get rebuilt.
      - name: Restore/seed deb cache
        uses: actions/cache@v4
        with:
          path: dcache
          key: dcache-${{ github.run_id }}
          restore-keys: |
            dcache-

      - name: Build all packages
        run: ./build.sh

      - name: Install reprepro
        run: sudo apt-get update && sudo apt-get install -y reprepro

      - name: Import GPG signing key
        uses: crazy-max/ghaction-import-gpg@v6
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.GPG_PASSPHRASE }}

      # Fresh rebuild of the repo each run from the freshly-built debs.
      - name: Build the apt repo
        run: |
          cd trixie
          reprepro -b . includedeb trixie ../debs/*.deb
          reprepro -b . list trixie

      - name: Assemble Pages site
        run: |
          mkdir -p public/trixie
          cp -r trixie/dists trixie/pool public/trixie/
          cp trixie/public.key public/trixie/public.key
          cat > public/index.html <<'EOF'
          <!doctype html><meta charset="utf-8">
          <title>x-chip-deb-repo</title>
          <h1>CHIP apt repo</h1>
          <p>Add the key, then the source:</p>
          <pre>
          curl -fsSL https://nextthingco.github.io/x-chip-deb-repo/trixie/public.key \
            | sudo tee /usr/share/keyrings/chip.asc >/dev/null
          echo 'deb [signed-by=/usr/share/keyrings/chip.asc] https://nextthingco.github.io/x-chip-deb-repo/trixie trixie main' \
            | sudo tee /etc/apt/sources.list.d/chip.list
          </pre>
          EOF

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
